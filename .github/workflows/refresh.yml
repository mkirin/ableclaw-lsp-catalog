name: Refresh catalog from upstream

on:
  schedule:
    # Daily at 02:00 UTC — between Eclipse JDT.LS evening + morning publish cycles.
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      force_pr:
        description: "Open a PR even if catalog.json didn't change"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Regenerate catalog.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node tools/build-catalog.mjs

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet catalog.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No upstream changes."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat catalog.json
          fi

      - name: Open PR
        if: steps.diff.outputs.changed == 'true' || inputs.force_pr == true
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: refresh/catalog-${{ github.run_number }}
          commit-message: |
            catalog: refresh from upstream

            Auto-generated by tools/build-catalog.mjs.
          title: "catalog: refresh from upstream"
          body: |
            Daily refresh — picks up new eclipse.jdt.ls snapshots and
            spring-tools releases.

            Diff:
            ```
            $(git diff catalog.json)
            ```

            Merging publishes the new manifest to ableclaw Desktop clients
            (10-minute client-side cache).
          delete-branch: true
